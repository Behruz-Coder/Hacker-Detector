        .status-bar { border-bottom: 1px solid #00ff41; padding: 15px; margin-bottom: 25px; font-size: 0.9rem; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #00ff41; color: #0a0a0a; padding: 12px; text-align: left; }
